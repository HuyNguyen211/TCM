# Render.com blueprint for the TCM backend.
# Create a new "Blueprint" from this repo, or a Web Service pointing at /backend.
services:
  - type: web
    name: tcm-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DB_MODE
        value: sheets
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false # set to your Vercel URL, e.g. https://tcm-app.vercel.app
      - key: SHEET_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_KEY
        sync: false # paste the raw service-account JSON
      # ---- Integrations (optional — power the Integrations page) ----
      # All secrets: sync:false keeps them out of the repo; set the values in the
      # Render dashboard (Environment). Any one left blank => "Not configured".
      # Atlassian (Jira) — token: https://id.atlassian.com/manage-profile/security/api-tokens
      - key: ATLASSIAN_BASE_URL
        sync: false # e.g. https://your-site.atlassian.net
      - key: ATLASSIAN_EMAIL
        sync: false
      - key: ATLASSIAN_API_TOKEN
        sync: false
      # Figma — token: Figma → Settings → Security → Personal access tokens
      - key: FIGMA_TOKEN
        sync: false
      # AI (Claude) — powers "Gen Testcase with AI". Prefer the API key on a server
      # (ANTHROPIC_AUTH_TOKEN OAuth is short-lived and NOT auto-refreshed).
      - key: ANTHROPIC_API_KEY
        sync: false # https://console.anthropic.com/settings/keys
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
